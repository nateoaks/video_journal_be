services:
  backend:
    build:
      context: .
    environment:
      # SQLite lives on the bind-mounted /data volume; four slashes = absolute path.
      DATABASE_URL: sqlite+aiosqlite:////data/journal.db
      STORAGE_BACKEND: local
      MEDIA_ROOT: /media
      OUTPUT_ROOT: /outputs
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
      - ./media:/media
      - ./outputs:/outputs
    restart: unless-stopped

  frontend:
    build:
      context: ../video_journal_fe
      # Next.js bakes rewrite destinations at build time, so the backend URL
      # must be supplied as a build arg, not just a runtime env var.
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
